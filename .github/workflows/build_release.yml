name: Build release

on:
  push:
    tags:
      # Push events to matching v*, i.e. v1.0, v20.15.10
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v3
      with:
        submodules: recursive
    - name: Install wasm-tools
      run: cargo install --git https://github.com/bytecodealliance/wasm-tools wasm-tools
    - name: Validate WIT
      run: wasm-tools component wit wg_display_widget_wit/wit
    - name: Add WASM target
      run: rustup target add wasm32-unknown-unknown
    - name: Build
      working-directory: ./widget
      run: cargo build --target wasm32-unknown-unknown --release
    - name: Convert to component
      working-directory: ./widget
      run: wasm-tools component new target/wasm32-unknown-unknown/release/widget.wasm -o widget.component.wasm
    - name: Build precompiler
      working-directory: ./wg_display_embedded_precompiler
      run: cargo build --release
    - name: Precompile component for ESP32
      run: ./wg_display_embedded_precompiler/target/release/wg-display-embedded-precompiler widget/widget.component.wasm  widget.precompiled.wasm
    - uses: ncipollo/release-action@v1
      with:
          artifacts: "widget.precompiled.wasm"
          artifactErrorsFailBuild: true
